spring:
  flyway:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cip113}
    user: ${DB_USERNAME:cardano}
    password: ${DB_PASSWORD:password}
    schemas: ${DB_SCHEMA:public}
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/migration
    out-of-order: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cip113}
    username: ${DB_USERNAME:cardano}
    password: ${DB_PASSWORD:password}

network: mainnet

wallet:
  mnemonic: ""

blockfrost:
  url: https://cardano-mainnet.blockfrost.io/api/v0/
  key: ""

koios:
  url: ${KOIOS_URL:https://api.koios.rest/api/v1/}

store:
  cardano:
    host: backbone.mainnet.cardanofoundation.org
    port: 3001
    protocol-magic: 764824073
    # Start from the block that minted the ref input for the contract
    sync-start-blockhash: 586ead1770fc2a59021b824bc0d65bf1d6060585384f257971204d5925f054c2
    sync-start-slot: 154984561
    keep-alive-interval: 1000

apiPrefix: /api/v1

keri:
  enabled: ${KERI_ENABLED:true}
  url: ${KERI_URL:http://localhost:3901}
  booturl: ${KERI_BOOT_URL:http://localhost:3903}
  identifier:
    bran: ${KERI_BRAN:0ADF2TpptgqcDE5IQUF1H}
    name: ${KERI_IDENTIFIER_NAME:identity}
    role: agent
    registry-name: kyc-registry
  schema:
    base-url: https://cred-issuance.demo.idw-sandboxes.cf-deployments.org/oobi/
    schemas:
      USER:
        said: EL9oOWU_7zQn_rD--Xsgi3giCWnFDaNvFMUGTOZx1ARO
        label: "Basic KYC"
      INSTITUTIONAL:
        said: ${KERI_SCHEMA_INSTITUTIONAL_SAID:ENPXp1vQzRF6JwIuS-mp2U8Uf1MoADoP_GqQ62VsDZWY}
        label: "Institutional KYC"
      VLEI:
        said: ${KERI_SCHEMA_VLEI_SAID:ENPXp1vQzRF6JwIuS-mp2U8Uf1MoADoP_GqQ62VsDZWY}
        label: "vLEI Credential"
  signing-mnemonic: ${KERI_SIGNING_MNEMONIC:nest wild farm beyond decide arm chuckle home raven card parrot nothing crazy casino hub broken scan height marine movie gloom village common off}
  kyc-proof-validity-days: ${KERI_PROOF_VALIDITY_DAYS:30}

# kyc-extended autonomous root-sync job. Signing reuses keri.signing-mnemonic
# (which carries full TEL authority — future hardening would scope this key to
# root updates only via a separate root_hash_updater_pkh in the global state).
kycExtended:
  enabled: ${KYC_EXTENDED_ENABLED:true}
  rootHashUpdateIntervalSeconds: ${KYC_EXTENDED_ROOT_UPDATE_INTERVAL_SECONDS:30}
  memberValidityDays: ${KYC_EXTENDED_MEMBER_VALIDITY_DAYS:30}
  postInsertSyncDelayMs: ${KYC_EXTENDED_POST_INSERT_SYNC_DELAY_MS:5000}
  postInsertCoalesceMs: ${KYC_EXTENDED_POST_INSERT_COALESCE_MS:30000}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

---
spring:
  config:
    activate:
      on-profile: preprod

network: preprod

wallet:
  mnemonic: ""

blockfrost:
  url: https://cardano-preprod.blockfrost.io/api/v0/

koios:
  url: ${KOIOS_URL:https://preprod.koios.rest/api/v1/}

store:
  cardano:
    host: ""
    port: 0
    protocol-magic: 1
    sync-start-blockhash: ""
    sync-start-slot: 0


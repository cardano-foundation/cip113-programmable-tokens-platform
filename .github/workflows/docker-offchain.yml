name: Docker Off-chain (Java)

on:
  push:
    tags:
      - "v*"
    branches: ["main"]
    paths:
      - "src/programmable-tokens-offchain-java/**"
      - ".github/workflows/docker-offchain.yml"
  workflow_dispatch:

env:
  DOCKER_REPO: cardanofoundation/programmable-tokens-indexer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/programmable-tokens-offchain-java
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Compute version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build bootJar
        run: ./gradlew bootJar

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/programmable-tokens-offchain-java
          file: src/programmable-tokens-offchain-java/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_REPO }}:latest
          cache-from: type=gha,scope=offchain
          cache-to: type=gha,scope=offchain,mode=max

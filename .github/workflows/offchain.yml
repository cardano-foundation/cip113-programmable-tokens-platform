name: Off-chain (Java)

on:
  push:
    branches: ["main"]
    paths:
      - "src/programmable-tokens-offchain-java/**"
      - ".github/workflows/offchain.yml"
  pull_request:
    paths:
      - "src/programmable-tokens-offchain-java/**"
      - ".github/workflows/offchain.yml"

defaults:
  run:
    working-directory: src/programmable-tokens-offchain-java

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build

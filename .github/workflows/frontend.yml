name: Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "src/programmable-tokens-frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "src/programmable-tokens-frontend/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: src/programmable-tokens-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/programmable-tokens-frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/programmable-tokens-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
